{% extends 'layouts/dashboard_base.html' %}

{% block dashboard_sidebar %}
<div class="mb-5 rounded-2xl bg-white p-4">
    <p class="text-sm text-body">Кабинет</p>
    <h2 class="text-xl font-black">Учителя</h2>
</div>

<nav class="grid gap-2">
    <a href="{% url 'teacher:dashboard' %}" class="rounded-2xl px-4 py-3 font-semibold transition {% if request.resolver_match.url_name == 'dashboard' %}bg-brand text-white shadow{% else %}text-body hover:bg-white hover:text-brand{% endif %}">
        Главная
    </a>

    <a href="{% url 'teacher:classrooms' %}" class="rounded-2xl px-4 py-3 font-semibold transition {% if request.resolver_match.url_name == 'classrooms' %}bg-brand text-white shadow{% else %}text-body hover:bg-white hover:text-brand{% endif %}">
        Классы
    </a>

    <a href="{% url 'teacher:students' %}" class="rounded-2xl px-4 py-3 font-semibold transition {% if request.resolver_match.url_name == 'students' %}bg-brand text-white shadow{% else %}text-body hover:bg-white hover:text-brand{% endif %}">
        Ученики
    </a>

    <a href="{% url 'main:profile' %}" class="rounded-2xl px-4 py-3 font-semibold text-body transition hover:bg-white hover:text-brand">
        Профиль
    </a>
</nav>
{% endblock %}
