{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans 'Security' %}{% endblock %}

{% block base %}
<div class='mx-auto max-w-3xl px-4 py-10'>
    <h1 class='mb-6 text-3xl font-bold'>{% trans 'Security' %}</h1>

    <div class='grid gap-6'>
        <section class='rounded-3xl bg-white p-6 shadow'>
            <h2 class='mb-4 text-xl font-semibold'>{% trans 'Change password' %}</h2>
            <form method='post' class='space-y-4'>
                {% csrf_token %}
                <input type='hidden' name='action' value='change_password'>
                {{ password_form.as_p }}
                <button type='submit' class='rounded-2xl bg-indigo-600 px-5 py-3 font-semibold text-white'>
                    {% trans 'Update password' %}
                </button>
            </form>
        </section>

        <section class='rounded-3xl bg-white p-6 shadow'>
            <h2 class='mb-4 text-xl font-semibold'>{% trans 'Delete account' %}</h2>
            <form method='post' class='space-y-4'>
                {% csrf_token %}
                <input type='hidden' name='action' value='delete_account'>
                {{ delete_form.as_p }}
                <button type='submit' class='rounded-2xl bg-red-600 px-5 py-3 font-semibold text-white'>
                    {% trans 'Delete account' %}
                </button>
            </form>
        </section>
    </div>
</div>
{% endblock %}
