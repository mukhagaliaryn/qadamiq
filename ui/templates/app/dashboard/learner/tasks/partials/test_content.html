<div class="grid gap-3">
    {% if image %}
        <img
            src="{{ image.url }}"
            alt=""
            class="w-full rounded-2xl object-cover border border-default"
        >
    {% endif %}

    {% if audio %}
        <audio controls class="w-full">
            <source src="{{ audio.url }}">
        </audio>
    {% endif %}

    {% if text %}
        <div class="prose max-w-none font-semibold text-heading">
            {{ text|safe }}
        </div>
    {% endif %}
</div>
